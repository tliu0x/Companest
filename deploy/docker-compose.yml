services:
  master-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python scripts/master_gateway.py --port 19000
    network_mode: host
    restart: unless-stopped
    env_file: .env
    mem_limit: 256m
    healthcheck:
      test: python -c "import socket; s=socket.socket(); s.connect(('127.0.0.1',19000)); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3

  companest:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m companest serve -c /app/deploy/config.prod.md
    network_mode: host
    restart: unless-stopped
    env_file: .env
    mem_limit: 512m
    volumes:
      - companest-data:/app/.companest
    environment:
      - LITELLM_MASTER_KEY
      - LITELLM_DEFAULT_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
      - COMPANEST_S3_BUCKET
    depends_on:
      master-gateway:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  companest-data:
